name: Check OCI ARM Capacity

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      send_test_email:
        description: 'Send a test email (yes/no)'
        required: false
        default: 'no'

jobs:
  check-capacity:
    runs-on: ubuntu-latest
    outputs:
      instance_created: ${{ steps.check.outputs.instance_created }}
      output_log: ${{ steps.check.outputs.output_log }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME=${{ secrets.OCI_PRIVATE_KEY_FILENAME }}
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_SHAPE=${{ secrets.OCI_SHAPE }}
          OCI_OCPUS=${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS=${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_MAX_INSTANCES=${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          EOF

      - name: Run OCI capacity check
        id: check
        run: |
          OUTPUT=$(php ./index.php 2>&1)
          echo "output_log<<OUTPUTEOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "OUTPUTEOF" >> $GITHUB_OUTPUT
          echo "--- OCI Check Output ---"
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "ocid1.instance\|launchinstance\|provisioning"; then
            echo "instance_created=true" >> $GITHUB_OUTPUT
            echo "=== INSTANCE CREATED SUCCESSFULLY ==="
          else
            echo "instance_created=false" >> $GITHUB_OUTPUT
          fi

  send-success-email:
    runs-on: ubuntu-latest
    needs: check-capacity
    if: needs.check-capacity.outputs.instance_created == 'true'
    steps:
      - name: Send success notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "OCI ARM Instance Created Successfully!"
          to: onemansdreamcg@gmail.com
          from: OCI Monitor <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Your Oracle Cloud ARM instance has been created successfully!

            === Instance Details ===
            ${{ needs.check-capacity.outputs.output_log }}

            === Next Steps ===
            1. Go to OCI Console: https://cloud.oracle.com/compute/instances?region=ap-tokyo-1
            2. Assign a public IP: Instance Details -> Attached VNICs -> IPv4 Addresses -> Edit -> Ephemeral
            3. Get SSH key from Cloud Shell: cat ~/.ssh/oci_instance_key
            4. SSH into instance: ssh -i oci_instance_key ubuntu@YOUR_PUBLIC_IP

  send-test-email:
    runs-on: ubuntu-latest
    if: github.event.inputs.send_test_email == 'yes'
    steps:
      - name: Send test email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "OCI Monitor Email Test - Configuration OK"
          to: onemansdreamcg@gmail.com
          from: OCI Monitor <${{ secrets.GMAIL_USERNAME }}>
          body: |
            This is a test email from your OCI ARM instance monitor.

            Configuration is working correctly!

            The monitor runs every 5 minutes and will send you an email
            when your Oracle Cloud ARM instance is successfully created.

            - OCI ARM Instance Monitor
